pluginManagement {
    repositories {
        maven {
            name = 'Fabric'
            url = 'https://maven.fabricmc.net/'
        }
        mavenCentral()
        gradlePluginPortal()
    }
}

dependencyResolutionManagement {
    // Fabric Loom добавляет свои локальные remapped-репозитории.
    // FAIL_ON_PROJECT_REPOS ломает Loom на Gradle 9.x.
    repositoriesMode.set(RepositoriesMode.PREFER_PROJECT)

    repositories {
        maven {
            name = 'Fabric'
            url = 'https://maven.fabricmc.net/'
        }
        mavenCentral()
    }
}

rootProject.name = 'nauzer-visuals-1.21.11'
